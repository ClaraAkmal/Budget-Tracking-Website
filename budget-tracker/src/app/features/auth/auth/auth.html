<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Login' : 'Register' }}</h2>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error"
          *ngIf="authForm.get('email')?.invalid && authForm.get('email')?.touched">
          Valid email is required.
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min 6 characters" />
        <span class="error"
          *ngIf="authForm.get('password')?.invalid && authForm.get('password')?.touched">
          Password must be at least 6 characters.
        </span>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="authForm.invalid || isLoading">
        {{ isLoading ? 'Please wait...' : (isLoginMode ? 'Login' : 'Register') }}
      </button>

    </form>

    <p class="toggle-text">
      {{ isLoginMode ? 'No account?' : 'Already registered?' }}
      <button type="button" (click)="toggleMode()">
        {{ isLoginMode ? 'Register' : 'Login' }}
      </button>
    </p>
  </div>
</div>
